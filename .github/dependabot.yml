version: 2

updates:
  # Backend npm dependencies
  - package-ecosystem: npm
    directory: /dashboard/backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    ignore:
      # Major version bumps for core infra — review manually
      - dependency-name: prisma
        update-types: [version-update:semver-major]
      - dependency-name: '@prisma/client'
        update-types: [version-update:semver-major]

  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /dashboard/frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend

  # Root npm dependencies (husky, prettier, etc.)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
