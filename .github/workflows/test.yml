name: Tests

on:
  pull_request:
    branches: [main, Feature_Roadmap, cloud-version]
  push:
    branches: [Feature_Roadmap]

jobs:
  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard/backend

      - name: Security audit (high severity)
        run: npm audit --audit-level=high
        working-directory: dashboard/backend
        continue-on-error: true # Warn but don't block on audit findings

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: dashboard/backend

      - name: Run unit tests
        run: npm test
        working-directory: dashboard/backend

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: dashboard/backend/coverage/

  test-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard/frontend

      - name: Security audit (high severity)
        run: npm audit --audit-level=high
        working-directory: dashboard/frontend
        continue-on-error: true

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: dashboard/frontend

      - name: Lint
        run: npm run lint
        working-directory: dashboard/frontend

      - name: Run tests
        run: npm test
        working-directory: dashboard/frontend

  validate-openapi:
    name: OpenAPI Spec Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate OpenAPI spec
        run: npx --yes @redocly/cli lint dashboard/backend/openapi.yaml --config .redocly.yaml

  check-env-not-committed:
    name: Security – No .env files committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify .env files are not tracked
        run: |
          if git ls-files | grep -E '^\.env$|/\.env$|^\.env\.local$'; then
            echo "❌ .env file(s) are tracked in git! Remove them and add to .gitignore."
            exit 1
          fi
          echo "✅ No .env files committed"
