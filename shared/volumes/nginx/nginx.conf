worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Required for multiple map blocks from tenant configs
    map_hash_bucket_size 512;
    map_hash_max_size 4096;

    # Resolver for Docker DNS (container name resolution)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Default server – returns 404 for unknown ports/hosts
    server {
        listen 8080 default_server;
        server_name _;

        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"multibase-nginx-gateway"}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"error":"No tenant configured for this port"}';
            add_header Content-Type application/json;
        }
    }

    # Include all tenant configs
    include /etc/nginx/conf.d/tenants/*.conf;
}
