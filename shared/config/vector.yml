# Multibase Cloud Version - Shared Vector Configuration
# Sammelt Logs von ALLEN Containern (shared + tenant)
# und routet sie an das zentrale Analytics-System.

api:
  enabled: true
  address: 0.0.0.0:9001

sources:
  docker_host:
    type: docker_logs
    exclude_containers:
      - multibase-vector  # Vector sammelt nicht seine eigenen Logs

transforms:
  # Schritt 1: Projekt-Erkennung aus Container-Name
  project_logs:
    type: remap
    inputs:
      - docker_host
    source: |-
      # Extrahiere Projektname aus Container-Name
      # Container-Format: {projekt}-{service} (z.B. "myapp-kong", "myapp-auth")
      # Shared Container: "multibase-{service}" (z.B. "multibase-db", "multibase-analytics")
      container = string!(.container_name)

      # Prüfe ob es ein Shared-Container ist
      if starts_with(container, "multibase-") {
        .project = "multibase-shared"
        .service_name = replace(container, r'^multibase-', "")
      } else {
        # Split nur beim ersten "-": [project, service]
        parts = split(container, "-", limit: 2)
        if length(parts) == 2 {
          .project = parts[0]
          .service_name = parts[1]
        } else {
          .project = "unknown"
          .service_name = container
        }
      }

      .event_message = del(.message)
      .appname = del(.container_name)
      del(.container_created_at)
      del(.container_id)
      del(.source_type)
      del(.stream)
      del(.label)
      del(.image)
      del(.host)

  # Schritt 2: Route nach Service-Typ
  router:
    type: route
    inputs:
      - project_logs
    route:
      kong: '.service_name == "kong"'
      auth: '.service_name == "auth"'
      rest: '.service_name == "rest"'
      realtime: '.service_name == "realtime"'
      storage: '.service_name == "storage"'
      functions: '.service_name == "edge-functions" || .service_name == "functions"'
      db: '.service_name == "db"'

  # Service-spezifische Log-Transformationen
  kong_logs:
    type: remap
    inputs:
      - router.kong
    source: |-
      req, err = parse_nginx_log(.event_message, "combined")
      if err == null {
          .timestamp = req.timestamp
          .metadata.request.headers.referer = req.referer
          .metadata.request.headers.user_agent = req.agent
          .metadata.request.headers.cf_connecting_ip = req.client
          .metadata.request.method = req.method
          .metadata.request.path = req.path
          .metadata.request.protocol = req.protocol
          .metadata.response.status_code = req.status
      }
      if err != null {
        abort
      }

  kong_err:
    type: remap
    inputs:
      - router.kong
    source: |-
      .metadata.request.method = "GET"
      .metadata.response.status_code = 200
      parsed, err = parse_nginx_log(.event_message, "error")
      if err == null {
          .timestamp = parsed.timestamp
          .severity = parsed.severity
          .metadata.request.host = parsed.host
          .metadata.request.headers.cf_connecting_ip = parsed.client
          url, err = split(parsed.request, " ")
          if err == null {
              .metadata.request.method = url[0]
              .metadata.request.path = url[1]
              .metadata.request.protocol = url[2]
          }
      }
      if err != null {
        abort
      }

  auth_logs:
    type: remap
    inputs:
      - router.auth
    source: |-
      parsed, err = parse_json(.event_message)
      if err == null {
          .metadata.timestamp = parsed.time
          .metadata = merge!(.metadata, parsed)
      }

  rest_logs:
    type: remap
    inputs:
      - router.rest
    source: |-
      parsed, err = parse_regex(.event_message, r'^(?P<time>.*): (?P<msg>.*)$')
      if err == null {
          .event_message = parsed.msg
          .timestamp = parsed.time
          .metadata.host = .project
      }

  realtime_logs:
    type: remap
    inputs:
      - router.realtime
    source: |-
      .metadata.project = del(.project)
      .metadata.external_id = .metadata.project
      parsed, err = parse_regex(.event_message, r'^(?P<time>\d+:\d+:\d+\.\d+) \[(?P<level>\w+)\] (?P<msg>.*)$')
      if err == null {
          .event_message = parsed.msg
          .metadata.level = parsed.level
      }

  storage_logs:
    type: remap
    inputs:
      - router.storage
    source: |-
      .metadata.project = del(.project)
      .metadata.tenantId = .metadata.project
      parsed, err = parse_json(.event_message)
      if err == null {
          .event_message = parsed.msg
          .metadata.level = parsed.level
          .metadata.timestamp = parsed.time
          .metadata.context[0].host = parsed.hostname
          .metadata.context[0].pid = parsed.pid
      }

  db_logs:
    type: remap
    inputs:
      - router.db
    source: |-
      .metadata.host = "db-shared"
      .metadata.parsed.timestamp = .timestamp
      parsed, err = parse_regex(.event_message, r'.*(?P<level>INFO|NOTICE|WARNING|ERROR|LOG|FATAL|PANIC?):.*', numeric_groups: true)
      if err != null || parsed == null {
        .metadata.parsed.error_severity = "info"
      }
      if parsed != null {
       .metadata.parsed.error_severity = parsed.level
      }
      if .metadata.parsed.error_severity == "info" {
          .metadata.parsed.error_severity = "log"
      }
      .metadata.parsed.error_severity = upcase!(.metadata.parsed.error_severity)

sinks:
  # Debug: Alle Logs auf stdout
  console_sink:
    type: console
    inputs:
      - project_logs
    encoding:
      codec: json
    target: stdout

  # Unmatched Logs
  default_logs:
    type: console
    inputs:
      - router._unmatched
    encoding:
      codec: json
    target: stdout

  # Analytics-Sinks (alle an Shared Analytics/Logflare)
  logflare_auth:
    type: "http"
    inputs:
      - auth_logs
    encoding:
      codec: "json"
    method: "post"
    request:
      retry_max_duration_secs: 10
    uri: "http://multibase-analytics:4000/api/logs?source_name=gotrue.logs.prod&api_key=${LOGFLARE_API_KEY}"

  logflare_realtime:
    type: "http"
    inputs:
      - realtime_logs
    encoding:
      codec: "json"
    method: "post"
    request:
      retry_max_duration_secs: 10
    uri: "http://multibase-analytics:4000/api/logs?source_name=realtime.logs.prod&api_key=${LOGFLARE_API_KEY}"

  logflare_rest:
    type: "http"
    inputs:
      - rest_logs
    encoding:
      codec: "json"
    method: "post"
    request:
      retry_max_duration_secs: 10
    uri: "http://multibase-analytics:4000/api/logs?source_name=postgREST.logs.prod&api_key=${LOGFLARE_API_KEY}"

  logflare_db:
    type: "http"
    inputs:
      - db_logs
    encoding:
      codec: "json"
    method: "post"
    request:
      retry_max_duration_secs: 10
    uri: "http://multibase-kong:8000/analytics/v1/api/logs?source_name=postgres.logs&api_key=${LOGFLARE_API_KEY}"

  logflare_functions:
    type: "http"
    inputs:
      - router.functions
    encoding:
      codec: "json"
    method: "post"
    request:
      retry_max_duration_secs: 10
    uri: "http://multibase-analytics:4000/api/logs?source_name=deno-relay-logs&api_key=${LOGFLARE_API_KEY}"

  logflare_storage:
    type: "http"
    inputs:
      - storage_logs
    encoding:
      codec: "json"
    method: "post"
    request:
      retry_max_duration_secs: 10
    uri: "http://multibase-analytics:4000/api/logs?source_name=storage.logs.prod.2&api_key=${LOGFLARE_API_KEY}"

  logflare_kong:
    type: "http"
    inputs:
      - kong_logs
      - kong_err
    encoding:
      codec: "json"
    method: "post"
    request:
      retry_max_duration_secs: 10
    uri: "http://multibase-analytics:4000/api/logs?source_name=cloudflare.logs.prod&api_key=${LOGFLARE_API_KEY}"
